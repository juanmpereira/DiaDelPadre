<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camino de Recuerdos para Papa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape shape-1" aria-hidden="true"></div>
    <div class="bg-shape shape-2" aria-hidden="true"></div>

    <main class="app">
      <section class="card" id="timeline-card">
        <p class="step" id="timeline-progress">Parada 1 de 6</p>
        <h1 class="title">El camino de nuestros recuerdos</h1>
        <p class="description" id="timeline-intro">
          Un recorrido por momentos que siempre voy a guardar: futbol, cancha, asados, viajes y todo lo compartido con vos.
        </p>

        <section class="timeline-board" id="timeline-board" aria-label="Camino de recuerdos"></section>
      </section>

      <section class="card hidden" id="memory-card">
        <p class="step" id="memory-step">Recuerdo desbloqueado</p>
        <h2 class="title" id="memory-title"></h2>
        <p class="description" id="memory-description"></p>

        <div class="memory-gallery-card">
          <div class="memory-media" id="memory-media"></div>
          <div class="memory-gallery-nav">
            <button class="btn btn-ghost" id="prev-media-btn" type="button">Anterior</button>
            <p class="memory-gallery-status" id="memory-gallery-status">1 / 1</p>
            <button class="btn btn-ghost" id="next-media-btn" type="button">Siguiente</button>
          </div>
          <div class="memory-thumbnails" id="memory-thumbnails"></div>
        </div>
        <p class="memory-note" id="memory-note"></p>

        <div class="actions hidden">
          <button class="btn btn-primary hidden" id="complete-stop-btn">Seguir recorrido</button>
        </div>
      </section>


    </main>

    <script src="script.js"></script>
  </body>
</html>
